##############################################################################
# gitlab-runner-stack — Docker Compose
##############################################################################
# Production-grade GitLab Runner with isolated Docker Engine (DinD + TLS)
##############################################################################

services:
  #--------------------------------------------------------------------------
  # cert-init — One-shot service: copies host certs into shared named volume
  #--------------------------------------------------------------------------
  # Decouples ./certs (host source) from the runtime certificate store so
  # DinD cannot overwrite pre-generated certificates via DOCKER_TLS_CERTDIR.
  #--------------------------------------------------------------------------
  cert-init:
    image: alpine:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-cert-init
    restart: "no"
    volumes:
      # Pre-generated TLS certificates from host (read-only source)
      - ./certs:/certs-src:ro
      # Shared named volume consumed by DinD and Runner
      - runner-certs:/certs
    command: >
      sh -c "rm -rf /certs/*
      && cp -a /certs-src/ca /certs-src/server /certs-src/client /certs/
      && find /certs -name '.gitkeep' -delete
      && for f in ca/ca.pem server/cert.pem server/key.pem client/cert.pem client/key.pem; do
      [ -f /certs/$$f ] || { echo 'ERROR: missing $$f - run ./scripts/generate-certs.sh first' >&2; exit 1; }; done"

  #--------------------------------------------------------------------------
  # Docker Engine — isolated daemon with TLS for CI builds
  #--------------------------------------------------------------------------
  docker:
    image: ${DOCKER_DIND_IMAGE:-docker:29-dind}
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-docker
    privileged: true
    restart: unless-stopped
    hostname: docker
    depends_on:
      cert-init:
        condition: service_completed_successfully
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_DRIVER: ${DOCKER_DRIVER:-overlay2}
      TZ: ${TZ:-UTC}
    volumes:
      # TLS certificates from shared named volume (populated by cert-init)
      - runner-certs:/certs
      # Persistent Docker data (images, containers, build cache)
      - ./docker/data:/var/lib/docker
      # Custom daemon configuration
      - ./docker/daemon.json:/etc/docker/daemon.json:ro
      # BuildKit data
      - ./docker/buildkit:/var/lib/buildkit
    networks:
      - runner-net
    healthcheck:
      test: ["CMD", "docker", "version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-5}
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY:-0}
          cpus: ${DOCKER_CPUS:-0}

  #--------------------------------------------------------------------------
  # GitLab Runner — connects to the isolated Docker daemon over TLS
  #--------------------------------------------------------------------------
  runner:
    image: ${GITLAB_RUNNER_IMAGE:-gitlab/gitlab-runner:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-runner
    restart: unless-stopped
    depends_on:
      docker:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      # Runner configuration (config.toml is rendered by register-runner.sh)
      - ./runner/config:/etc/gitlab-runner
      # Build cache shared with CI job containers
      - ./cache:/cache
      # TLS certificates from shared named volume (read-only)
      - runner-certs:/certs:ro
    networks:
      - runner-net
    healthcheck:
      test: ["CMD", "gitlab-runner", "verify", "--max-warnings", "0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-5}

##############################################################################
# Networks
##############################################################################
networks:
  runner-net:
    name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-net
    driver: bridge

##############################################################################
# Volumes
##############################################################################
volumes:
  runner-certs:
