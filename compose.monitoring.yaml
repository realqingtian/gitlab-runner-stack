##############################################################################
# gitlab-runner-stack — Monitoring Overlay (Phase 4)
##############################################################################
# Enable with:
#   docker compose -f compose.yaml -f compose.monitoring.yaml up -d
#
# Adds: Prometheus, Grafana, AlertManager
# The GitLab Runner exposes its Prometheus metrics on :9252
##############################################################################

services:
  #--------------------------------------------------------------------------
  # Prometheus — scrapes metrics from the GitLab Runner
  #--------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./monitoring/prometheus/data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - runner-net
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-5}

  #--------------------------------------------------------------------------
  # Grafana — dashboards and visualization
  #--------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./monitoring/grafana/data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - runner-net
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-5}

  #--------------------------------------------------------------------------
  # AlertManager — routes alerts based on Prometheus rules
  #--------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ${COMPOSE_PROJECT_NAME:-gitlab-runner-stack}-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - runner-net
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: ${LOG_MAX_FILE:-5}

  # Expose runner metrics port when monitoring is enabled
  runner:
    ports:
      - "9252:9252"
