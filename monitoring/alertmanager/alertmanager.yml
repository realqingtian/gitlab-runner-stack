global:
  resolve_timeout: 5m

# Route configuration — customize with your notification channels
# (Slack, email, PagerDuty, etc.)
route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "default"
    # Replace with your actual notification config:
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/..."
    # email_configs:
    #   - to: "ops@example.com"
